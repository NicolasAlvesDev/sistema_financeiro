{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mb-5">
    <section class="col-12 col-md-6" aria-labelledby="form-title">
        <div class="card-financeiro">
            
            <header>
                <h1 id="form-title" class="h4 mb-4 fw-bold text-light title-spacing">
                    <i class="bi bi-plus-circle me-2 text-purple" aria-hidden="true"></i>Nova Transação
                </h1>
            </header>
            
            <form method="POST" action="{{ url_for('transacoes.nova_transacao') }}" id="form-transacao">
                
                <div class="mb-3">
                    <label for="tipo_movimentacao" class="form-label text-secundario fw-bold label-small">Tipo de Movimentação</label>
                    <select name="tipo_movimentacao" id="tipo_movimentacao" class="form-select">
                        <option value="despesa">Despesa (Saída)</option>
                        <option value="receita">Receita (Entrada)</option>
                        <option value="transferencia">Transferência Interna</option>
                    </select>
                </div>
                
                <div class="mb-3">
                    <label for="descricao" class="form-label text-secundario fw-bold label-small">Descrição</label>
                    <input type="text" name="descricao" id="descricao" class="form-control" placeholder="Ex: Manutenção CG 150 ou Repasse iFood" required>
                </div>
                
                <div class="mb-3">
                    <label for="valor" class="form-label text-secundario fw-bold label-small">Valor (R$)</label>
                    <input type="number" step="0.01" name="valor" id="valor" class="form-control" placeholder="0,00" required>
                </div>
                
                <div class="mb-3">
                    <label for="data_atual" class="form-label text-secundario fw-bold label-small">Data</label>
                    <input type="date" name="data" id="data_atual" class="form-control" required>
                </div>
                
                <div class="mb-3" id="div_categoria">
                    <label for="categoria_id" class="form-label text-secundario fw-bold label-small">Categoria</label>
                    <select name="categoria_id" id="categoria_id" class="form-select">
                        <option value="">Nenhuma</option>
                        {% for cat in categorias %}
                            <option value="{{ cat.id }}">{{ cat.nome }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="mb-3">
                    <label for="conta_id" id="label_conta_origem" class="form-label text-secundario fw-bold label-small">Conta de Origem/Destino</label>
                    <select name="conta_id" id="conta_id" class="form-select" required>
                        <option value="">Selecione a conta</option>
                        {% for conta in contas %}
                            <option value="{{ conta.id }}">{{ conta.nome }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="mb-4 d-none" id="div_conta_destino">
                    <label for="conta_destino_id" class="form-label text-purple fw-bold label-small">Conta de Destino (Recebe o dinheiro)</label>
                    <select name="conta_destino_id" id="conta_destino_id" class="form-select">
                        <option value="">Selecione a conta de destino</option>
                        {% for conta in contas %}
                            <option value="{{ conta.id }}">{{ conta.nome }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <button type="submit" id="btn-submit" class="btn btn-primary-gradient w-100 py-3 fw-bold text-light">
                    Salvar Registro
                </button>
            </form>

        </div>
    </section>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        
        // 1. Preenche a data atual automaticamente
        const dataInput = document.getElementById('data_atual');
        if(dataInput) {
            dataInput.valueAsDate = new Date();
        }

        // 2. Lógica para alternar os campos dependendo do tipo de movimentação
        const selectTipo = document.getElementById('tipo_movimentacao');
        const divDestino = document.getElementById('div_conta_destino');
        const divCategoria = document.getElementById('div_categoria');
        const labelOrigem = document.getElementById('label_conta_origem');
        const inputDestino = document.getElementById('conta_destino_id');

        if(selectTipo) {
            selectTipo.addEventListener('change', function() {
                if (this.value === 'transferencia') {
                    // Usamos classList para adicionar/remover o display:none do Bootstrap
                    divDestino.classList.remove('d-none');
                    inputDestino.required = true;
                    
                    divCategoria.classList.add('d-none');
                    labelOrigem.innerText = 'Conta de Origem (Sai o dinheiro)';
                } else {
                    divDestino.classList.add('d-none');
                    inputDestino.required = false;
                    
                    divCategoria.classList.remove('d-none');
                    labelOrigem.innerText = 'Conta de Origem/Destino';
                }
            });
        }

        // 3. Efeito de loading no botão para evitar duplo clique acidental
        const formTransacao = document.getElementById('form-transacao');
        if(formTransacao) {
            formTransacao.addEventListener('submit', function() {
                const btn = document.getElementById('btn-submit');
                btn.disabled = true;
                btn.innerHTML = '<i class="bi bi-hourglass-split me-1"></i>Salvando...';
            });
        }
    });
</script>
{% endblock %}
